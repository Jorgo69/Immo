# ============================================================
# Configuration - Standard 41DEVS
# ============================================================
# Les valeurs sensibles doivent être définies dans le fichier .env
# Ce fichier sert uniquement de fallback pour les valeurs par défaut non sensibles.

database:
  type: postgres
  host: localhost
  port: 5432
  username: ""
  password: ""
  database: back_end_api_immo_app
  synchronize: false
  logging: true

ssl:
  require: false
  rejectUnauthorized: false

server:
  port: 3000

jwt:
  secret: ""
  expireIn: "7d"

auth:
  channels: "email,whatsapp"
  otpTtlMinutes: 10

smtp:
  host: localhost
  port: 587
  user: ""
  password: ""
  from: "Immo Bénin <noreply@immo-benin.local>"
  secure: false

encryption:
  key: ""

app:
  name: "Immo Benin"
  version: "1.0.0"
  semanticUrl: ""

notifications:
  vapidPublicKey: ""
  vapidPrivateKey: ""
